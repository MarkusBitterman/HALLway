# ╔════════════════╗
# ║  HALLway                                                                  ║
# ║  .sops.yaml - SOPS encryption configuration                               ║
# ╚════════════════╝
#
# This file tells `sops` which age public keys can decrypt each secrets file.
# Keys are derived from SSH keys using ssh-to-age:
#
#   Admin key (for editing secrets):
#     Generate: age-keygen -o ~/.config/sops/age/keys.txt
#     Public key is printed on generation
#
#   Host key (for runtime decryption):
#     ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
#
# To edit secrets: sops hosts/2600AD/secrets.yaml
# To add a key:    Add to the appropriate creation_rules, then run:
#                  sops updatekeys hosts/2600AD/secrets.yaml

keys:
  # Admin key (bittermang) - can edit all secrets
  # Generated: age-keygen -o ~/.config/sops/age/keys.txt
  - &admin age1pfljuqx2dvsqv0gqhn9ajnglh8pxupeap4arhz6c8psajke22ynq6zwrv5

  # Host keys - can decrypt at runtime
  - &host_2600AD age1hhyeuve5crq8edq57r06g7evc7wm0jjv63jgk2eyt6mj79zwkgfquvj25s
  - &host_hallpass age1a9m3tv0wz63whadg277533752j2lgzqa8s88tu8750h2xljud9xsdef259

creation_rules:
  # 2600AD secrets - encrypted for admin + 2600AD host
  - path_regex: hosts/2600AD/secrets\.yaml$
    key_groups:
      - age:
          - *admin
          - *host_2600AD

  # HALLpass.space secrets - encrypted for admin only (until host key known)
  - path_regex: hosts/HALLpass\.space/secrets\.yaml$
    key_groups:
      - age:
          - *admin
          # - *host_hallpass

  # HelloMoto secrets - encrypted for admin only (phone uses user SSH key)
  - path_regex: hosts/HelloMoto/secrets\.yaml$
    key_groups:
      - age:
          - *admin
